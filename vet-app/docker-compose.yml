version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: vet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-vet123}
      POSTGRES_DB: ${POSTGRES_DB:-vetdb}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vet -d vetdb']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
